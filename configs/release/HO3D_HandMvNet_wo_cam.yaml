name: handmvnet
base_output_dir: /data1/DATA/HandMvNet/ho3d-wo-cam-output/
data:
  name: ho3d
  batch_size: 32
  dataset_dir: /data1/DATA/POEM-v2/HO3D_mv/
  test_dataset_dir: /data1/DATA/POEM-v2/HO3D_mv_test/
  mask_size: 32
  depth_size: 32
  heatmap_size: 32
  image_size: 256
  mano_models_dir: /data1/DATA/assets/mano_v1_2/models/
  num_workers: 3
  augment: true
  pad_image: true
  add_val_to_train: true
model:
  selected_views:
  - 0
  - 1
  - 2
  - 3
  - 4
  fusion: cross_attn  # cross_attn, cross_attn_learnable_query
  fusion_layers: 5
  pos_enc:
  - pos2d
  # - crop    
  - sin 
  use_gcn: true
  backbone: "resnet"
  backbone_type: "50_paper"  # 18, 34, 50_paper
  backbone_early_return: 3
  backbone_channels: # output
  - 1024
  backbone_pretrained: true
train:
  debug: false
  vis_every_n_epochs: 10
  epochs: 100
  accumulate_batch: 2
  gpus: 2
  gpu_ids: "2,3"
  mask_invisible_joints: true
  root_relative: true
  loss_weights:
    heatmap: 10.
    joints_2d: 1.
    joints_3d: 1000
    # g2d: 1.  # loss b/w backprojected predicted 3d joints and groundtruth 2d joints
    # p2d: 0.5  # loss b/w backprojected predicted 3d joints and predicted 2d joints
  lr: 0.0001
  lr_scheduler:
    gamma: 0.5
    milestones:
    - 15
    - 30
    - 45
    - 60
  weight_decay: 0.05
